<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — Cornerstone Event Design</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0e0c0a;
      color: #e8dcc8;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      padding: 40px 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid #2e2720;
    }

    h1 {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #c9a96e;
    }

    .controls {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .secret-input {
      padding: 10px 16px;
      background: #161310;
      border: 1px solid #2e2720;
      border-radius: 4px;
      color: #e8dcc8;
      font-size: 13px;
      width: 280px;
    }

    button {
      padding: 10px 20px;
      background: #c9a96e;
      color: #0e0c0a;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    button:hover {
      background: #dab896;
    }

    button:disabled {
      background: #8a7d6b;
      cursor: not-allowed;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: #161310;
      border: 1px solid #2e2720;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
    }

    .stat-card h3 {
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8a7d6b;
      margin-bottom: 12px;
      font-weight: 500;
    }

    .stat-card .number {
      font-size: 48px;
      font-weight: 300;
      color: #c9a96e;
    }

    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .filters button {
      padding: 8px 16px;
      background: transparent;
      color: #c9a96e;
      border: 1px solid #c9a96e;
      border-radius: 4px;
      font-size: 11px;
    }

    .filters button.active {
      background: #c9a96e;
      color: #0e0c0a;
    }

    .filters button:hover {
      background: #c9a96e;
      color: #0e0c0a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #161310;
      border: 1px solid #2e2720;
      border-radius: 8px;
      overflow: hidden;
    }

    thead {
      background: #1e1a15;
      border-bottom: 1px solid #2e2720;
    }

    th {
      padding: 16px;
      text-align: left;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8a7d6b;
      font-weight: 500;
    }

    td {
      padding: 16px;
      border-bottom: 1px solid #2e2720;
      font-size: 13px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status.pending {
      background: #2e2720;
      color: #c9a96e;
    }

    .status.confirmed {
      background: #1a3a2a;
      color: #4caf7a;
    }

    .status.cancelled {
      background: #3a1a1a;
      color: #e05c5c;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      padding: 6px 12px;
      font-size: 11px;
      border-radius: 4px;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn.view {
      color: #c9a96e;
      border-color: #c9a96e;
    }

    .action-btn.view:hover {
      background: #c9a96e;
      color: #0e0c0a;
    }

    .action-btn.confirm {
      color: #4caf7a;
      border-color: #4caf7a;
    }

    .action-btn.confirm:hover {
      background: #4caf7a;
      color: #0e0c0a;
    }

    .action-btn.cancel {
      color: #e05c5c;
      border-color: #e05c5c;
    }

    .action-btn.cancel:hover {
      background: #e05c5c;
      color: #fff;
    }

    .action-btn.delete {
      color: #d14520;
      border-color: #d14520;
    }

    .action-btn.delete:hover {
      background: #d14520;
      color: #fff;
    }

    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #8a7d6b;
    }

    .message {
      padding: 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }

    .message.show {
      display: block;
    }

    .message.success {
      background: #1a3a2a;
      color: #4caf7a;
      border: 1px solid #4caf7a;
    }

    .message.error {
      background: #3a1a1a;
      color: #e05c5c;
      border: 1px solid #e05c5c;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: #161310;
      border: 1px solid #2e2720;
      border-radius: 8px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
    }

    .modal-content h2 {
      font-size: 24px;
      margin-bottom: 16px;
      color: #c9a96e;
    }

    .modal-content p {
      font-size: 14px;
      color: #8a7d6b;
      margin-bottom: 8px;
      line-height: 1.6;
    }

    .modal-content .booking-detail {
      background: #1e1a15;
      padding: 16px;
      border-radius: 4px;
      margin: 20px 0;
      font-size: 13px;
    }

    .modal-content .booking-detail strong {
      color: #c9a96e;
      display: block;
      margin-bottom: 4px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-actions button {
      flex: 1;
    }

    .modal-actions .close-btn {
      background: #2e2720;
      color: #e8dcc8;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>CORNERSTONE — Admin Dashboard</h1>
      <div class="controls">
        <input 
          type="password" 
          id="secretInput" 
          class="secret-input" 
          placeholder="Enter admin secret..."
          value="test-secret-change-this-in-production"
        >
        <button onclick="loadBookings()">Load Bookings</button>
      </div>
    </header>

    <div id="message" class="message"></div>

    <div class="stats">
      <div class="stat-card">
        <h3>Total Bookings</h3>
        <div class="number" id="totalCount">0</div>
      </div>
      <div class="stat-card">
        <h3>Pending</h3>
        <div class="number" id="pendingCount">0</div>
      </div>
      <div class="stat-card">
        <h3>Confirmed</h3>
        <div class="number" id="confirmedCount">0</div>
      </div>
      <div class="stat-card">
        <h3>Cancelled</h3>
        <div class="number" id="cancelledCount">0</div>
      </div>
    </div>

    <div class="filters">
      <button class="active" onclick="filterBookings('all')">All</button>
      <button onclick="filterBookings('pending')">Pending</button>
      <button onclick="filterBookings('confirmed')">Confirmed</button>
      <button onclick="filterBookings('cancelled')">Cancelled</button>
    </div>

    <table id="bookingsTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Message</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="bookingsBody">
        <tr><td colspan="6" class="empty">Loading bookings...</td></tr>
      </tbody>
    </table>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Booking Details</h2>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="close-btn" onclick="closeModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    let allBookings = [];
    let currentFilter = 'all';

    async function loadBookings() {
      const secret = document.getElementById('secretInput').value;
      if (!secret) {
        showMessage('Please enter the admin secret', 'error');
        return;
      }

      try {
        const response = await fetch(`/api/bookings?secret=${encodeURIComponent(secret)}`);
        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || 'Failed to load bookings', 'error');
          return;
        }

        allBookings = data.bookings;
        document.getElementById('totalCount').textContent = data.stats.total;
        document.getElementById('pendingCount').textContent = data.stats.pending;
        document.getElementById('confirmedCount').textContent = data.stats.confirmed;
        document.getElementById('cancelledCount').textContent = data.stats.cancelled;

        renderBookings();
        showMessage('Bookings loaded successfully', 'success');
      } catch (err) {
        showMessage('Error: ' + err.message, 'error');
      }
    }

    function renderBookings() {
      const filtered = currentFilter === 'all' 
        ? allBookings 
        : allBookings.filter(b => b.status === currentFilter);

      const tbody = document.getElementById('bookingsBody');
      
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No bookings found</td></tr>';
        return;
      }

      tbody.innerHTML = filtered.map(booking => `
        <tr>
          <td><strong>${booking.name}</strong></td>
          <td>${booking.email}</td>
          <td>${booking.phone || '—'}</td>
          <td>${booking.message.substring(0, 30)}${booking.message.length > 30 ? '...' : ''}</td>
          <td><span class="status ${booking.status}">${booking.status}</span></td>
          <td>
            <div class="actions">
              <button class="action-btn view" onclick="viewBooking('${booking._id}')">View</button>
              ${booking.status === 'pending' ? `
                <button class="action-btn confirm" onclick="confirmBooking('${booking._id}')">Confirm</button>
                <button class="action-btn cancel" onclick="cancelBooking('${booking._id}')">Cancel</button>
              ` : ''}
              <button class="action-btn delete" onclick="deleteBooking('${booking._id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function filterBookings(status) {
      currentFilter = status;
      document.querySelectorAll('.filters button').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderBookings();
    }

    function viewBooking(id) {
      const booking = allBookings.find(b => b._id === id);
      if (!booking) return;

      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <div class="booking-detail">
          <strong>Name:</strong>
          ${booking.name}
        </div>
        <div class="booking-detail">
          <strong>Email:</strong>
          ${booking.email}
        </div>
        <div class="booking-detail">
          <strong>Phone:</strong>
          ${booking.phone || 'Not provided'}
        </div>
        <div class="booking-detail">
          <strong>Message:</strong>
          ${booking.message}
        </div>
        <div class="booking-detail">
          <strong>Status:</strong>
          <span class="status ${booking.status}">${booking.status}</span>
        </div>
        <div class="booking-detail">
          <strong>Submitted:</strong>
          ${new Date(booking.createdAt).toLocaleString()}
        </div>
      `;
      document.getElementById('modal').classList.add('show');
    }

    async function confirmBooking(id) {
      const secret = document.getElementById('secretInput').value;
      if (!secret) {
        showMessage('Please enter the admin secret', 'error');
        return;
      }

      if (!confirm('Confirm this booking?')) return;

      try {
        const response = await fetch(`/api/bookings/${id}/confirm?secret=${encodeURIComponent(secret)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || 'Failed to confirm booking', 'error');
          return;
        }

        // Update the booking in the list
        const booking = allBookings.find(b => b._id === id);
        if (booking) booking.status = 'confirmed';
        
        renderBookings();
        loadBookings(); // Reload to update stats
        showMessage('Booking confirmed successfully', 'success');
      } catch (err) {
        showMessage('Error: ' + err.message, 'error');
      }
    }

    async function cancelBooking(id) {
      const secret = document.getElementById('secretInput').value;
      if (!secret) {
        showMessage('Please enter the admin secret', 'error');
        return;
      }

      if (!confirm('Cancel this booking?')) return;

      try {
        const response = await fetch(`/api/bookings/${id}/cancel?secret=${encodeURIComponent(secret)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || 'Failed to cancel booking', 'error');
          return;
        }

        // Update the booking in the list
        const booking = allBookings.find(b => b._id === id);
        if (booking) booking.status = 'cancelled';
        
        renderBookings();
        loadBookings(); // Reload to update stats
        showMessage('Booking cancelled successfully', 'success');
      } catch (err) {
        showMessage('Error: ' + err.message, 'error');
      }
    }

    async function deleteBooking(id) {
      const secret = document.getElementById('secretInput').value;
      if (!secret) {
        showMessage('Please enter the admin secret', 'error');
        return;
      }

      if (!confirm('Are you sure you want to delete this booking? This action cannot be undone.')) return;

      try {
        const response = await fetch(`/api/bookings/${id}?secret=${encodeURIComponent(secret)}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(data.error || 'Failed to delete booking', 'error');
          return;
        }

        // Remove the booking from the list
        allBookings = allBookings.filter(b => b._id !== id);
        
        renderBookings();
        loadBookings(); // Reload to update stats
        showMessage('Booking deleted successfully', 'success');
      } catch (err) {
        showMessage('Error: ' + err.message, 'error');
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('show');
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message show ${type}`;
      setTimeout(() => msg.classList.remove('show'), 5000);
    }

    // Load bookings on page load
    window.addEventListener('load', loadBookings);
  </script>
</body>
</html>
